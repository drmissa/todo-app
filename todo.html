<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #22c55e;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 480px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .input-wrapper {
      display: flex;
      padding: 20px;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .input-wrapper input {
      flex: 1;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .input-wrapper input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .input-wrapper button {
      padding: 14px 24px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .input-wrapper button:hover {
      background: var(--primary-hover);
    }

    .input-wrapper button:active {
      transform: scale(0.98);
    }

    .stats {
      display: flex;
      padding: 16px 20px;
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
      gap: 24px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .stat-value {
      background: var(--primary);
      color: white;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 12px;
    }

    .stat-value.completed {
      background: var(--success);
    }

    ul {
      list-style: none;
      max-height: 400px;
      overflow-y: auto;
    }

    li {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      gap: 14px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: #f8fafc;
    }

    li.completed .todo-text {
      text-decoration: line-through;
      color: var(--text-secondary);
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .checkbox:hover {
      border-color: var(--primary);
    }

    .checkbox.checked {
      background: var(--success);
      border-color: var(--success);
    }

    .checkbox.checked::after {
      content: '✓';
      color: white;
      font-size: 14px;
      font-weight: bold;
    }

    .todo-text {
      flex: 1;
      font-size: 15px;
      color: var(--text);
      word-break: break-word;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: all 0.2s;
      font-size: 18px;
    }

    .delete-btn:hover {
      background: #fee2e2;
      color: var(--danger);
    }

    .empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-secondary);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    li {
      animation: slideIn 0.2s ease-out;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Tasks</h1>
      <p>Stay organized, get things done</p>
    </div>
    
    <div class="card">
      <div class="input-wrapper">
        <input type="text" id="todoInput" placeholder="What needs to be done?">
        <button onclick="addTodo()">Add Task</button>
      </div>
      
      <div class="stats">
        <div class="stat">
          <span>Total</span>
          <span class="stat-value" id="totalCount">0</span>
        </div>
        <div class="stat">
          <span>Done</span>
          <span class="stat-value completed" id="completedCount">0</span>
        </div>
      </div>
      
      <ul id="todoList"></ul>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos')) || [];

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
      render();
    }

    function render() {
      const list = document.getElementById('todoList');
      
      document.getElementById('totalCount').textContent = todos.length;
      document.getElementById('completedCount').textContent = todos.filter(t => t.completed).length;

      if (todos.length === 0) {
        list.innerHTML = `
          <div class="empty">
            <div class="empty-icon">📝</div>
            <p>No tasks yet. Add one above!</p>
          </div>
        `;
        return;
      }

      list.innerHTML = todos.map((todo, i) => `
        <li class="${todo.completed ? 'completed' : ''}">
          <div class="checkbox ${todo.completed ? 'checked' : ''}" onclick="toggle(${i})"></div>
          <span class="todo-text">${escapeHtml(todo.text)}</span>
          <button class="delete-btn" onclick="deleteTodo(${i})" title="Delete">×</button>
        </li>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function addTodo() {
      const input = document.getElementById('todoInput');
      if (input.value.trim()) {
        todos.unshift({ text: input.value.trim(), completed: false });
        input.value = '';
        save();
      }
    }

    function toggle(i) {
      todos[i].completed = !todos[i].completed;
      save();
    }

    function deleteTodo(i) {
      todos.splice(i, 1);
      save();
    }

    document.getElementById('todoInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
