<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --primary-light: rgba(99, 102, 241, 0.1);
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --danger: #ef4444;
      --danger-light: #fef2f2;
      --success: #22c55e;
      --warning: #f59e0b;
      --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
      --shadow-lg: 0 10px 40px -10px rgba(0,0,0,0.12);
      --radius: 16px;
      --radius-sm: 10px;
    }

    .dark {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #334155;
      --primary-light: rgba(99, 102, 241, 0.2);
      --danger-light: rgba(239, 68, 68, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px;
      transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-x: hidden;
    }

    body.search-active { padding-top: 100px; }

    .app { width: 100%; max-width: 560px; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
      gap: 12px;
    }

    .header-content { flex: 1; }

    .header h1 { 
      font-size: 32px; 
      font-weight: 700; 
      color: var(--text);
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .header p { font-size: 14px; color: var(--text-secondary); }

    .header-actions { display: flex; gap: 8px; }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: none;
      background: var(--card-bg);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      box-shadow: var(--shadow);
    }

    .icon-btn:hover { 
      background: var(--primary-light);
      color: var(--primary);
      transform: scale(1.05);
    }

    .search-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--card-bg);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow-lg);
      z-index: 100;
      transform: translateY(-100%);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search-bar.active {
      transform: translateY(0);
      opacity: 1;
    }

    .search-bar input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 17px;
      color: var(--text);
      outline: none;
      font-family: inherit;
    }

    .search-bar input::placeholder { color: var(--text-muted); }

    .search-bar .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px;
    }

    .progress-container {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .progress-text { font-size: 14px; color: var(--text-secondary); font-weight: 500; }
    .progress-percent { font-size: 24px; font-weight: 700; color: var(--primary); }

    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #818cf8);
      border-radius: 10px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .input-section {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .input-main {
      display: flex;
      gap: 10px;
    }

    .input-main input {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid var(--border);
      border-radius: 14px;
      font-size: 16px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: all 0.2s;
    }

    .input-main input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-light);
    }

    .input-main button {
      padding: 14px 24px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .input-main button:hover { background: var(--primary-hover); transform: scale(1.02); }
    .input-main button:active { transform: scale(0.98); }

    .input-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }

    .input-toggle:hover { color: var(--primary); }
    .input-toggle .arrow { transition: transform 0.2s; }
    .input-toggle.open .arrow { transform: rotate(180deg); }

    .input-options {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .input-options.open {
      max-height: 200px;
      opacity: 1;
      margin-top: 14px;
    }

    .input-options select,
    .input-options input {
      padding: 12px 14px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-options select:focus,
    .input-options input:focus { border-color: var(--primary); }

    .category-tabs {
      display: flex;
      padding: 12px 16px;
      gap: 6px;
      overflow-x: auto;
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }

    .category-tabs::-webkit-scrollbar { display: none; }

    .cat-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      background: var(--bg);
      color: var(--text-secondary);
    }

    .cat-btn.active {
      background: var(--primary);
      color: white;
    }

    .cat-btn:not(.active):hover { background: var(--primary-light); color: var(--primary); }

    .task-list { list-style: none; max-height: 450px; overflow-y: auto; }

    .task-list.dragging { cursor: grabbing; }

    .task-item {
      display: flex;
      align-items: flex-start;
      padding: 16px 20px;
      gap: 14px;
      border-bottom: 1px solid var(--border);
      transition: all 0.2s;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .task-item:hover { background: var(--bg); }
    .task-item.sortable-ghost { opacity: 0.4; background: var(--primary-light); }
    .task-item.sortable-chosen { box-shadow: var(--shadow-lg); }

    .task-item.completed .task-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .checkbox {
      width: 24px;
      height: 24px;
      border: 2.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .checkbox:hover { border-color: var(--primary); transform: scale(1.1); }
    .checkbox.checked { 
      background: var(--success); 
      border-color: var(--success);
      animation: checkPop 0.3s ease;
    }

    @keyframes checkPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .checkbox.checked::after {
      content: '✓';
      color: white;
      font-size: 14px;
      font-weight: bold;
    }

    .task-content { flex: 1; min-width: 0; }

    .task-text {
      font-size: 15px;
      color: var(--text);
      word-break: break-word;
      line-height: 1.5;
      cursor: text;
      padding: 2px 4px;
      margin: -2px -4px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .task-text:hover { background: var(--primary-light); }
    .task-text:focus { outline: none; background: var(--primary-light); }

    .task-meta {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .tag.category-work { background: #dbeafe; color: #1d4ed8; }
    .tag.category-personal { background: #fce7f3; color: #db2777; }
    .tag.category-shopping { background: #fef3c7; color: #d97706; }
    .tag.category-health { background: #dcfce7; color: #16a34a; }

    .tag.priority-high { background: #fecaca; color: #dc2626; }
    .tag.priority-medium { background: #fef3c7; color: #d97706; }
    .tag.priority-low { background: #bbf7d0; color: #16a34a; }

    .due-date {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .due-date.overdue { color: var(--danger); font-weight: 500; }

    .task-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .task-item:hover .task-actions { opacity: 1; }

    .action-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      font-size: 16px;
      transition: all 0.2s;
    }

    .action-btn:hover { 
      background: var(--border); 
      color: var(--text);
    }

    .action-btn.delete:hover { 
      background: var(--danger-light); 
      color: var(--danger);
    }

    .completed-section {
      border-top: 1px solid var(--border);
    }

    .completed-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .completed-header:hover { background: var(--bg); }

    .completed-header h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .completed-header .count {
      background: var(--success);
      color: white;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
    }

    .completed-toggle {
      color: var(--text-muted);
      transition: transform 0.2s;
    }

    .completed-toggle.open { transform: rotate(180deg); }

    .completed-list {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .completed-list.open { max-height: 300px; }

    .empty {
      padding: 50px 20px;
      text-align: center;
      color: var(--text-secondary);
    }

    .empty-icon { font-size: 64px; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .empty p { font-size: 15px; }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text);
      color: var(--bg);
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 200;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .shortcuts-hint {
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .shortcuts-hint kbd {
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 4px;
      margin: 0 2px;
      font-family: inherit;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 480px) {
      .input-options { grid-template-columns: 1fr; }
      .header h1 { font-size: 26px; }
      .task-actions { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="search-bar" id="searchBar">
    <button class="close-btn" onclick="closeSearch()">←</button>
    <input type="text" id="searchInput" placeholder="Search tasks...">
    <button class="close-btn" onclick="clearSearch()">✕</button>
  </div>

  <div class="app">
    <div class="header">
      <div class="header-content">
        <h1>Tasks</h1>
        <p>Stay organized, get things done</p>
      </div>
      <div class="header-actions">
        <button class="icon-btn" onclick="openSearch()" title="Search (/)">🔍</button>
        <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme (d)">🌙</button>
      </div>
    </div>

    <div class="progress-container" id="progressContainer" style="display: none;">
      <div class="progress-header">
        <span class="progress-text">Today's progress</span>
        <span class="progress-percent" id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <div class="card">
      <div class="input-section">
        <div class="input-main">
          <input type="text" id="todoInput" placeholder="What needs to be done?" autofocus>
          <button onclick="addTodo()">Add Task</button>
        </div>
        <div class="input-toggle" onclick="toggleOptions()">
          <span class="arrow">▼</span>
          <span>Add details (priority, due date, category)</span>
        </div>
        <div class="input-options" id="inputOptions">
          <select id="category">
            <option value="personal" selected>Personal</option>
            <option value="work">Work</option>
            <option value="shopping">Shopping</option>
            <option value="health">Health</option>
          </select>
          <select id="priority">
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
            <option value="low">Low</option>
          </select>
          <input type="date" id="dueDate">
        </div>
      </div>

      <div class="category-tabs" id="categoryTabs">
        <button class="cat-btn active" onclick="setCategory('all')">All</button>
        <button class="cat-btn" onclick="setCategory('work')">Work</button>
        <button class="cat-btn" onclick="setCategory('personal')">Personal</button>
        <button class="cat-btn" onclick="setCategory('shopping')">Shopping</button>
        <button class="cat-btn" onclick="setCategory('health')">Health</button>
      </div>

      <ul class="task-list" id="taskList"></ul>

      <div class="completed-section" id="completedSection" style="display: none;">
        <div class="completed-header" onclick="toggleCompleted()">
          <h3>
            Completed <span class="count" id="completedCount">0</span>
          </h3>
          <span class="completed-toggle" id="completedToggle">▼</span>
        </div>
        <ul class="task-list completed-list" id="completedList"></ul>
      </div>

      <div class="shortcuts-hint">
        <kbd>n</kbd> new task <kbd>d</kbd> dark mode <kbd>/</kbd> search <kbd>Esc</kbd> close
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <span id="toastMessage">Task deleted</span>
    <button onclick="undoDelete()">Undo</button>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos')) || [];
    let deletedTodo = null;
    let deleteTimeout = null;
    let currentCategory = 'all';
    let searchQuery = '';
    let isDark = localStorage.getItem('theme') === 'dark';
    let completedExpanded = true;

    if (isDark) document.body.classList.add('dark');

    const categories = ['work', 'personal', 'shopping', 'health'];

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      render();
    }

    function render() {
      const activeTodos = todos.filter(t => !t.completed);
      const completedTodos = todos.filter(t => t.completed);
      
      let filtered = activeTodos;
      if (currentCategory !== 'all') {
        filtered = activeTodos.filter(t => t.category === currentCategory);
      }
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(t => t.text.toLowerCase().includes(q));
      }

      const completedFiltered = completedTodos.filter(t => 
        currentCategory === 'all' || t.category === currentCategory
      );

      updateProgress(activeTodos.length, completedTodos.length);
      renderActiveTasks(filtered);
      renderCompletedTasks(completedFiltered);
      updateCategoryButtons();
    }

    function updateProgress(active, total) {
      const container = document.getElementById('progressContainer');
      if (total === 0) {
        container.style.display = 'none';
        return;
      }
      container.style.display = 'block';
      const percent = total > 0 ? Math.round((total - active) / total * 100) : 0;
      document.getElementById('progressPercent').textContent = percent + '%';
      document.getElementById('progressFill').style.width = percent + '%';
    }

    function renderActiveTasks(filtered) {
      const list = document.getElementById('taskList');
      
      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty">
            <div class="empty-icon">${searchQuery ? '🔍' : '✨'}</div>
            <p>${searchQuery ? 'No tasks found' : 'No tasks yet. Add one above!'}</p>
          </div>`;
        return;
      }

      list.innerHTML = filtered.map((todo, i) => {
        const overdue = todo.due && new Date(todo.due) < new Date().toDateString();
        return `
          <li class="task-item" data-id="${todo.id}">
            <div class="checkbox ${todo.completed ? 'checked' : ''}" onclick="toggle('${todo.id}')"></div>
            <div class="task-content">
              <div class="task-text" contenteditable="true" 
                onblur="editTodo('${todo.id}', this.textContent)"
                onkeydown="handleEditKey(event, '${todo.id}', this)">${escapeHtml(todo.text)}</div>
              <div class="task-meta">
                <span class="tag category-${todo.category || 'personal'}">${todo.category || 'personal'}</span>
                <span class="tag priority-${todo.priority || 'medium'}">${todo.priority || 'medium'}</span>
                ${todo.due ? `<span class="due-date ${overdue ? 'overdue' : ''}">📅 ${formatDate(todo.due)}</span>` : ''}
              </div>
            </div>
            <div class="task-actions">
              <button class="action-btn delete" onclick="deleteTodo('${todo.id}')" title="Delete">🗑️</button>
            </div>
          </li>`;
      }).join('');

      initSortable();
    }

    function renderCompletedTasks(filtered) {
      const section = document.getElementById('completedSection');
      const list = document.getElementById('completedList');
      const count = document.getElementById('completedCount');
      
      count.textContent = filtered.length;
      section.style.display = filtered.length > 0 ? 'block' : 'none';

      if (filtered.length === 0) {
        list.innerHTML = '';
        return;
      }

      list.innerHTML = filtered.map(todo => `
        <li class="task-item completed">
          <div class="checkbox checked" onclick="toggle('${todo.id}')"></div>
          <div class="task-content">
            <div class="task-text">${escapeHtml(todo.text)}</div>
          </div>
          <div class="task-actions">
            <button class="action-btn delete" onclick="deleteTodo('${todo.id}')" title="Delete">🗑️</button>
          </div>
        </li>`).join('');
    }

    function updateCategoryButtons() {
      document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase() === currentCategory);
      });
    }

    function initSortable() {
      const list = document.getElementById('taskList');
      if (list.sortable) return;
      
      list.sortable = new Sortable(list, {
        animation: 200,
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        handle: '.task-content',
        onEnd: function(evt) {
          const item = filteredTodos()[evt.oldIndex];
          todos.splice(todos.indexOf(item), 1);
          const newIndex = todos.findIndex(t => t.id === parseInt(evt.item.dataset.id));
          todos.splice(newIndex >= 0 ? newIndex : filteredTodos().length, 0, item);
          save();
        }
      });
    }

    function filteredTodos() {
      let filtered = todos.filter(t => !t.completed);
      if (currentCategory !== 'all') {
        filtered = filtered.filter(t => t.category === currentCategory);
      }
      return filtered;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const today = new Date().toDateString();
      const tomorrow = new Date(Date.now() + 86400000).toDateString();
      if (date.toDateString() === today) return 'Today';
      if (date.toDateString() === tomorrow) return 'Tomorrow';
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function addTodo() {
      const input = document.getElementById('todoInput');
      if (!input.value.trim()) return;

      const todo = {
        id: Date.now(),
        text: input.value.trim(),
        completed: false,
        category: document.getElementById('category').value,
        priority: document.getElementById('priority').value,
        due: document.getElementById('dueDate').value || null,
        createdAt: new Date().toISOString()
      };

      todos.unshift(todo);
      input.value = '';
      document.getElementById('dueDate').value = '';
      closeOptions();
      save();
      input.focus();
    }

    function toggle(id) {
      const todo = todos.find(t => t.id == id);
      if (todo) {
        todo.completed = !todo.completed;
        save();
      }
    }

    function deleteTodo(id) {
      const index = todos.findIndex(t => t.id == id);
      if (index > -1) {
        deletedTodo = { todo: todos[index], index };
        todos.splice(index, 1);
        save();
        showToast('Task deleted');
        clearTimeout(deleteTimeout);
        deleteTimeout = setTimeout(() => {
          deletedTodo = null;
        }, 5000);
      }
    }

    function undoDelete() {
      if (deletedTodo) {
        todos.splice(deletedTodo.index, 0, deletedTodo.todo);
        deletedTodo = null;
        clearTimeout(deleteTimeout);
        save();
        hideToast();
      }
    }

    function editTodo(id, newText) {
      const todo = todos.find(t => t.id == id);
      if (todo && newText.trim()) {
        todo.text = newText.trim();
        save();
      }
    }

    function handleEditKey(e, id, el) {
      if (e.key === 'Enter') {
        e.preventDefault();
        el.blur();
      }
    }

    function setCategory(cat) {
      currentCategory = cat;
      render();
    }

    function toggleOptions() {
      const toggle = document.querySelector('.input-toggle');
      const options = document.getElementById('inputOptions');
      toggle.classList.toggle('open');
      options.classList.toggle('open');
    }

    function closeOptions() {
      document.querySelector('.input-toggle').classList.remove('open');
      document.getElementById('inputOptions').classList.remove('open');
    }

    function toggleCompleted() {
      const list = document.getElementById('completedList');
      const toggle = document.getElementById('completedToggle');
      list.classList.toggle('open');
      toggle.classList.toggle('open');
    }

    function toggleTheme() {
      isDark = !isDark;
      document.body.classList.toggle('dark');
      save();
    }

    function openSearch() {
      document.body.classList.add('search-active');
      document.getElementById('searchBar').classList.add('active');
      document.getElementById('searchInput').focus();
    }

    function closeSearch() {
      document.body.classList.remove('search-active');
      document.getElementById('searchBar').classList.remove('active');
      clearSearch();
    }

    function clearSearch() {
      searchQuery = '';
      document.getElementById('searchInput').value = '';
      render();
    }

    function showToast(message) {
      document.getElementById('toastMessage').textContent = message;
      document.getElementById('toast').classList.add('show');
    }

    function hideToast() {
      document.getElementById('toast').classList.remove('show');
    }

    document.getElementById('todoInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') addTodo();
    });

    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value;
      render();
    });

    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' && e.target.id !== 'searchInput') return;
      
      if (e.key === 'n' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        document.getElementById('todoInput').focus();
      }
      if (e.key === 'd' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        toggleTheme();
      }
      if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        openSearch();
      }
      if (e.key === 'Escape') {
        closeSearch();
        document.getElementById('todoInput').blur();
      }
    });

    let touchStartX = 0;
    document.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
    });

    document.addEventListener('touchend', e => {
      const touchEndX = e.changedTouches[0].screenX;
      const diff = touchStartX - touchEndX;
      if (diff > 80) {
        const item = e.target.closest('.task-item');
        if (item) {
          const id = item.dataset.id;
          deleteTodo(id);
        }
      }
    });

    render();
  </script>
</body>
</html>
